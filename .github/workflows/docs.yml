name: Deploy docs (MkDocs → GitHub Pages)

# Publica o site de documentação (MkDocs Material) no GitHub Pages a cada push
# na develop que toque a documentação. O site é gerado a partir de docs/ +
# mkdocs.yml — nenhum conteúdo é duplicado.
#
# PRÉ-REQUISITO (uma vez, manual): em Settings → Pages do repositório, definir
# "Source: GitHub Actions". Sem isso, o passo de deploy falha — o build, não.

on:
  push:
    branches: [develop]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

# Permissões que o deploy oficial do Pages exige.
permissions:
  contents: read
  pages: write
  id-token: write

# Uma publicação por vez; não cancela uma em andamento (deploy deve concluir).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (mkdocs build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar MkDocs Material
        run: pip install mkdocs-material

      - name: Build do site (modo estrito)
        # --strict faz o build falhar se houver link interno quebrado ou
        # página fora do nav — pega erros de documentação no CI.
        run: mkdocs build --strict

      - name: Upload do artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy (GitHub Pages)
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar no Pages
        id: deployment
        uses: actions/deploy-pages@v4
