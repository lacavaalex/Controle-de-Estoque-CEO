# Stack completa: nginx + frontend + backend + Postgres.
# Sobe com `docker compose up -d --build`, acessa em http://localhost/estoque-ho/.
services:

  db:
    image: postgres:16-alpine
    container_name: estoque-ho-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ceo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ceo}
      POSTGRES_DB: ${POSTGRES_DB:-ceo_estoque}
    volumes:
      - ceo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ceo} -d ${POSTGRES_DB:-ceo_estoque}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [estoque-ho-net]
    # Sem `ports:` — banco, backend e front não saem pro host; só o nginx publica.

  backend:
    build:
      context: ./backend
    container_name: estoque-ho-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Na rede do compose o banco é o host "db".
      DATABASE_URL: postgresql://${POSTGRES_USER:-ceo}:${POSTGRES_PASSWORD:-ceo}@db:5432/${POSTGRES_DB:-ceo_estoque}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-ceo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ceo}
      POSTGRES_DB: ${POSTGRES_DB:-ceo_estoque}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      AGENTE_TOKEN: ${AGENTE_TOKEN:-dev-token-trocar}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
    depends_on:
      db:
        condition: service_healthy
    networks: [estoque-ho-net]

  frontend:
    build:
      context: ./frontend
      args:
        APP_BASE: /estoque-ho/
        VITE_API_BASE: /estoque-ho/api
    container_name: estoque-ho-frontend
    restart: unless-stopped
    depends_on: [backend]
    networks: [estoque-ho-net]

  nginx:
    image: nginx:1.27-alpine
    container_name: estoque-ho-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/estoque-ho.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [frontend, backend]
    networks: [estoque-ho-net]

volumes:
  ceo_pgdata:

networks:
  estoque-ho-net:
    driver: bridge
