# Stack completa: nginx + frontend + backend + Postgres.
# Sobe com `docker compose up -d --build`, acessa em http://localhost/estoque-ho/.
services:

  backend:
    build:
      context: ./backend
    container_name: projeto-5-backend
    ports:
      - "3005:3000"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      # Postgres compartilhado na rede cin_proxy (host cin-postgres).
      DATABASE_URL: postgresql://${POSTGRES_USER:-projeto5_user}:${POSTGRES_PASSWORD:-senha_projeto5}@cin-postgres:5432/${POSTGRES_DB:-projeto5_db}
      POSTGRES_HOST: cin-postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-projeto5_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_projeto5}
      POSTGRES_DB: ${POSTGRES_DB:-projeto5_db}
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      AGENTE_TOKEN: ${AGENTE_TOKEN:-dev-token-trocar}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-false}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://clinicasdigitais.cin.ufpe.br,http://vm-clindig.cin.ufpe.br}
    networks:
      - cin_proxy

  frontend:
    build:
      context: ./frontend
    container_name: projeto-5-frontend
    volumes:
      - /opt/docker/frontends/projeto5:/output
    depends_on:
      - backend
    restart: "no"

networks:
  cin_proxy:
    external: true