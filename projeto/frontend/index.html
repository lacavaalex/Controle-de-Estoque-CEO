<div class="card">
    <h2>Cadastrar Novo Item</h2>
    <input type="text" id="nome" placeholder="Nome do Item">
    
    <input 
        type="number" 
        id="preco" 
        placeholder="Preço R$" 
        step="0.01" 
        min="0.01" 
        oninput="if(this.value < 0.01) this.value = 0.01;"
    >

    <input 
        type="number" 
        id="quantidade" 
        placeholder="Quantidade Inicial" 
        min="1" 
        oninput="if(this.value < 1) this.value = 1;"
    >

    <button onclick="enviarDados()">Cadastrar no Sistema</button>
    <div id="status"></div>
</div>

<script>
    async function enviarDados() {
        const statusDiv = document.getElementById('status');
        const dados = {
            nome: document.getElementById('nome').value,
            preco: document.getElementById('preco').value,
            quantidade: document.getElementById('quantidade').value
        };

        try {
            const response = await fetch('http://localhost:3001/itens', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            const result = await response.json();

            if (response.ok) {
                statusDiv.style.color = "green";
                statusDiv.innerText = "✅ " + result.mensagem;
                // Limpa os campos após sucesso
                document.getElementById('nome').value = "";
                document.getElementById('preco').value = "";
                document.getElementById('quantidade').value = "";
            } else {
                statusDiv.style.color = "red";
                statusDiv.innerText = "❌ Erro: " + result.erro;
            }
        } catch (err) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "❌ Servidor fora do ar!";
        }
    }
</script>
