# nginx interno do container do front: serve o build do Vite sob /estoque-ho/
# com fallback de SPA. O proxy reverso do domínio fica em deploy/nginx.
server {
    listen 80;
    server_name _;

    location /estoque-ho/ {
        alias /usr/share/nginx/html/estoque-ho/;
        try_files $uri $uri/ /estoque-ho/index.html;
    }

    location = /estoque-ho {
        return 301 /estoque-ho/;
    }
}
