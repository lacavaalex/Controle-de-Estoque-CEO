# Proxy reverso do domínio compartilhado. No servidor do CIn, cada clínica é um
# location dentro do server de clinicasdigitais.cin.ufpe.br — aqui ficam os
# nossos (/estoque-ho). Localmente: http://localhost/estoque-ho/
server {
    listen 80;
    server_name clinicasdigitais.cin.ufpe.br localhost;

    # /estoque-ho/api -> backend (tira o prefixo antes de bater no Express).
    location /estoque-ho/api/ {
        rewrite ^/estoque-ho/api/(.*)$ /$1 break;
        proxy_pass http://estoque-ho-backend:3000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /estoque-ho -> frontend.
    location /estoque-ho/ {
        proxy_pass http://estoque-ho-frontend:80;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /estoque-ho {
        return 301 /estoque-ho/;
    }
}
